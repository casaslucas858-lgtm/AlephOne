<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzit — AlephOne</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ── QUIZ CARDS ── */
        .quiz-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 18px 20px;
            margin-bottom: 12px;
            transition: all var(--t);
            position: relative;
            overflow: hidden;
        }

        .quiz-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: linear-gradient(180deg, var(--teal), var(--accent));
        }

        .quiz-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }

        .quiz-card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
        }

        .quiz-card-title {
            font-family: var(--font-display);
            font-size: 0.95em;
            font-weight: 700;
            color: var(--text);
        }

        .quiz-card-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .quiz-card-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* ── CÓDIGO DE SALA (alumno) ── */
        .codigo-input-wrap {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        .codigo-input {
            flex: 1;
            padding: 12px 16px;
            background: var(--bg-card);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            font-family: var(--font-display);
            font-size: 1.4em;
            font-weight: 800;
            color: var(--text);
            letter-spacing: 4px;
            text-transform: uppercase;
            text-align: center;
            transition: all var(--t);
        }

        .codigo-input:focus {
            outline: none;
            border-color: var(--teal);
            box-shadow: 0 0 0 3px rgba(38,212,199,0.1);
        }

        .codigo-input::placeholder {
            color: var(--text-faint);
            letter-spacing: 2px;
            font-size: 0.7em;
        }

        /* ── MODAL ASIGNAR ── */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
            z-index: 500; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-xl);
            padding: 28px; width: 100%; max-width: 460px;
            box-shadow: var(--shadow-lg);
            animation: fadeUp 0.2s ease both;
        }
        .modal-header {
            display: flex; align-items: center;
            justify-content: space-between; margin-bottom: 22px;
        }
        .modal-title { font-family: var(--font-display); font-size: 1.05em; font-weight: 700; }
        .modal-close {
            background: var(--bg-subtle); border: 1px solid var(--border);
            color: var(--text-muted); width: 30px; height: 30px;
            border-radius: var(--radius); display: flex; align-items: center;
            justify-content: center; cursor: pointer; transition: all var(--t);
        }
        .modal-close:hover { background: var(--bg-hover); color: var(--text); }

        /* ── TIMER INFO ── */
        .timer-info {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: rgba(38,212,199,0.06);
            border: 1px solid rgba(38,212,199,0.15);
            border-radius: var(--radius);
            font-size: 0.82em;
            color: var(--text-muted);
            margin-bottom: 14px;
        }
        .timer-info strong { color: var(--teal-dim); font-family: var(--font-display); }
        body.dark-mode .timer-info strong { color: var(--teal); }

        /* ── ASSIGNED QUIZ CARD (alumno) ── */
        .assigned-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 16px 18px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all var(--t);
        }
        .assigned-card:hover { box-shadow: var(--shadow-md); }

        .assigned-icon {
            width: 42px; height: 42px;
            border-radius: var(--radius);
            background: linear-gradient(135deg, var(--teal), var(--accent));
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2em;
            flex-shrink: 0;
            color: #0a0a0a;
        }

        .assigned-info { flex: 1; min-width: 0; }
        .assigned-title { font-weight: 700; font-size: 0.9em; font-family: var(--font-display); }
        .assigned-meta  { font-size: 0.76em; color: var(--text-muted); margin-top: 2px; }

        .mobile-nav-btn {
            display: none;
            background: var(--bg-subtle); border: 1px solid var(--border);
            color: var(--text); width: 34px; height: 34px;
            border-radius: var(--radius); font-size: 1em;
            align-items: center; justify-content: center; cursor: pointer;
        }
        @media (max-width: 900px) { .mobile-nav-btn { display: flex; } }
    </style>
</head>
<body>

        <!-- Renderizado por JS según rol -->
    </main>

<!-- Modal asignar quiz -->
<div class="modal-overlay" id="modalAsignar" onclick="cerrarModalSiFondo(event)">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title">📋 Asignar quiz como tarea</span>
            <button class="modal-close" onclick="cerrarModal()">✕</button>
        </div>
        <p id="asignarQuizNombre" style="font-weight:700;margin-bottom:14px;color:var(--text-muted);font-size:0.9em;"></p>

        <div class="timer-info">
            ⏱ Tiempo total automático: <strong id="timerTotal">— min</strong>
            (suma de tiempos por pregunta)
        </div>

        <div class="form-group">
            <label class="form-label">Curso</label>
            <select id="asignarCurso" class="form-select">
                <option value="3A">3A</option>
                <option value="3B">3B</option>
                <option value="4A">4A</option>
                <option value="todos">Todos</option>
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">Fecha de cierre (opcional)</label>
            <input type="datetime-local" id="asignarCierre" class="form-input">
        </div>
        <div id="asignarError" class="form-error" style="margin-bottom:8px;"></div>
        <div style="display:flex;gap:8px;justify-content:flex-end;">
            <button class="btn btn-secondary" onclick="cerrarModal()">Cancelar</button>
            <button class="btn btn-primary" onclick="confirmarAsignar()">Asignar →</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
let currentUser = null;
let quizAsignarId = null;
let quizAsignarPreguntas = [];

// ── RENDER DOCENTE ────────────────────────────────────────
async function renderDocente() {
    const main = document.getElementById('mainContent');
    main.innerHTML = `
        <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px;">
            <div>
                <h2>🧪 Quizzit</h2>
                <p>Tus quizzes — lanzalos en vivo o asignalos como tarea.</p>
            </div>
            <a href="quiz-crear.html" class="btn btn-primary">+ Crear quiz</a>
        </div>
        <div id="quizzesList">
            <div class="empty-state"><div class="spinner"></div></div>
        </div>`;

    const quizzes = await AlephAPI.Quiz.getDelDocente(currentUser.username);
    const lista = document.getElementById('quizzesList');

    if (!quizzes.length) {
        lista.innerHTML = `<div class="empty-state">
            <div class="empty-icon">🧪</div>
            <p>No creaste ningún quiz todavía</p>
        </div>`;
        return;
    }

    lista.innerHTML = quizzes.map(q => {
        const nPreguntas = q.preguntas?.length || 0;
        const tiempoTotal = (q.preguntas || []).reduce((a, p) => a + (p.tiempo_segundos || 30), 0);
        const minutos = Math.ceil(tiempoTotal / 60);

        return `
            <div class="quiz-card fade-up">
                <div class="quiz-card-header">
                    <span class="quiz-card-title">${sanitize(q.titulo)}</span>
                </div>
                <div class="quiz-card-meta">
                    <span class="tag tag-teal">${nPreguntas} pregunta${nPreguntas !== 1 ? 's' : ''}</span>
                    <span class="tag tag-accent">⏱ ~${minutos} min</span>
                    <span class="tag tag-blue">${sanitize(q.curso)}</span>
                </div>
                <div class="quiz-card-actions">
                    <button class="btn btn-primary btn-sm"
                            onclick="lanzarEnVivo('${q.id}')">
                        ▶ Lanzar en vivo
                    </button>
                    <button class="btn btn-secondary btn-sm"
                            onclick="abrirAsignar('${q.id}', '${sanitize(q.titulo)}', ${JSON.stringify(q.preguntas || []).replace(/"/g, '&quot;')})">
                        📋 Asignar como tarea
                    </button>
                    <a href="quiz-crear.html?edit=${q.id}" class="btn btn-ghost btn-sm">Editar</a>
                    <button class="btn btn-danger btn-sm"
                            onclick="eliminarQuiz('${q.id}')">Eliminar</button>
                </div>
            </div>`;
    }).join('');
}

// ── RENDER ALUMNO ─────────────────────────────────────────
async function renderAlumno() {
    const main = document.getElementById('mainContent');
    main.innerHTML = `
        <div class="page-header">
            <h2>🧪 Quizzit</h2>
            <p>Uní a una sala en vivo o completá quizzes asignados.</p>
        </div>

        <!-- Código de sala -->
        <div class="card fade-up" style="margin-bottom:20px;">
            <div class="card-header">
                <span class="card-title">▶ Unirme a sala en vivo</span>
            </div>
            <div class="codigo-input-wrap">
                <input type="text" class="codigo-input" id="codigoInput"
                       placeholder="Código de sala" maxlength="6"
                       oninput="this.value=this.value.toUpperCase()"
                       onkeydown="if(event.key==='Enter')entrarSala()">
                <button class="btn btn-primary" onclick="entrarSala()">Entrar →</button>
            </div>
            <p id="codigoError" class="form-error"></p>
        </div>

        <!-- Quizzes asignados -->
        <div class="card fade-up">
            <div class="card-header">
                <span class="card-title">📋 Quizzes asignados</span>
            </div>
            <div id="asignadosList">
                <div class="empty-state"><div class="spinner"></div></div>
            </div>
        </div>`;

    const asignaciones = await AlephAPI.Asignacion.getParaCurso(currentUser.curso || '3A');
    const lista = document.getElementById('asignadosList');

    if (!asignaciones.length) {
        lista.innerHTML = `<div class="empty-state">
            <div class="empty-icon">📭</div>
            <p>Sin quizzes asignados todavía</p>
        </div>`;
        return;
    }

    // Ver cuáles ya completó
    const resultados = await Promise.all(
        asignaciones.map(a => AlephAPI.Asignacion.getResultados(a.id))
    );

    lista.innerHTML = asignaciones.map((a, i) => {
        const completado = resultados[i]?.find(r => r.user_id === currentUser.id);
        const nPreguntas = a.quizzes?.preguntas?.length || 0;
        const tiempoTotal = (a.quizzes?.preguntas || []).reduce((acc, p) => acc + (p.tiempo_segundos || 30), 0);
        const minutos = Math.ceil(tiempoTotal / 60);
        const cierre = a.fecha_cierre ? formatFecha(a.fecha_cierre) : 'Sin fecha';

        return `
            <div class="assigned-card">
                <div class="assigned-icon">🧪</div>
                <div class="assigned-info">
                    <div class="assigned-title">${sanitize(a.quizzes?.titulo || 'Quiz')}</div>
                    <div class="assigned-meta">
                        ${nPreguntas} preguntas · ⏱ ${minutos} min · Cierre: ${cierre}
                        ${completado ? ` · ✅ Completado — ${completado.puntaje} pts` : ''}
                    </div>
                </div>
                ${completado
                    ? `<span class="tag tag-success">Completado</span>`
                    : `<button class="btn btn-primary btn-sm"
                               onclick="window.location.href='quiz-asignado.html?id=${a.id}'">
                               Empezar →
                       </button>`
                }
            </div>`;
    }).join('');
}

// ── LANZAR EN VIVO ────────────────────────────────────────
async function lanzarEnVivo(quizId) {
    const res = await AlephAPI.Sala.crear({ quizId, modo: 'clasico' });
    if (!res.ok) { showToast('Error creando sala: ' + res.error, 'error'); return; }
    window.location.href = `quiz-sala.html?sala=${res.sala.id}`;
}

// ── ENTRAR A SALA (alumno) ────────────────────────────────
async function entrarSala() {
    const codigo = document.getElementById('codigoInput').value.trim().toUpperCase();
    const errorEl = document.getElementById('codigoError');
    if (codigo.length !== 6) { errorEl.textContent = 'El código tiene 6 caracteres'; return; }

    const res = await AlephAPI.Sala.getByCode(codigo);
    if (!res.ok || !res.sala) { errorEl.textContent = 'Sala no encontrada o ya terminó'; return; }

    window.location.href = `quiz-jugar.html?sala=${res.sala.id}`;
}

// ── ASIGNAR COMO TAREA ────────────────────────────────────
function abrirAsignar(quizId, titulo, preguntas) {
    quizAsignarId = quizId;
    try { quizAsignarPreguntas = typeof preguntas === 'string' ? JSON.parse(preguntas) : preguntas; }
    catch { quizAsignarPreguntas = []; }

    document.getElementById('asignarQuizNombre').textContent = titulo;

    const tiempoTotal = quizAsignarPreguntas.reduce((a, p) => a + (p.tiempo_segundos || 30), 0);
    document.getElementById('timerTotal').textContent = `${Math.ceil(tiempoTotal / 60)} min`;

    const manana = new Date();
    manana.setDate(manana.getDate() + 7);
    manana.setHours(23, 59, 0, 0);
    const localISO = new Date(manana.getTime() - manana.getTimezoneOffset() * 60000).toISOString().slice(0,16);
    document.getElementById('asignarCierre').value = localISO;
    document.getElementById('asignarError').textContent = '';

    document.getElementById('modalAsignar').classList.add('open');
}

async function confirmarAsignar() {
    const curso   = document.getElementById('asignarCurso').value;
    const cierre  = document.getElementById('asignarCierre').value;
    const errorEl = document.getElementById('asignarError');

    const res = await AlephAPI.Asignacion.crear({
        quizId: quizAsignarId,
        curso,
        fechaCierre: cierre ? new Date(cierre).toISOString() : null
    });

    if (!res.ok) { errorEl.textContent = 'Error al asignar: ' + res.error; return; }

    cerrarModal();
    showToast('Quiz asignado al curso ' + curso, 'success');
}

// ── ELIMINAR QUIZ ─────────────────────────────────────────
async function eliminarQuiz(quizId) {
    if (!confirm('¿Eliminar este quiz? Se borrarán todas sus preguntas.')) return;
    await AlephAPI.Quiz.eliminar(quizId);
    showToast('Quiz eliminado', 'success');
    renderDocente();
}

// ── MODAL HELPERS ─────────────────────────────────────────
function cerrarModal() { document.getElementById('modalAsignar').classList.remove('open'); }
function cerrarModalSiFondo(e) { if (e.target.id === 'modalAsignar') cerrarModal(); }
function toggleMobileNav() { document.getElementById('sidebar').classList.toggle('open'); }

function renderAvatar(user) {
    const el = document.getElementById('userAvatar');
    if (el) el.textContent = user.username.charAt(0).toUpperCase();
    const roleEl = document.getElementById('userRole');
    if (roleEl) {
        const roles = { student: 'Estudiante', teacher: 'Docente', director: 'Director' };
        roleEl.textContent = roles[user.role] || user.role;
        roleEl.className = `role-badge ${user.role}`;
    }
}

// ── INIT ─────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
    await AlephAPI.Auth.init();
    currentUser = requireAuth();
    if (!currentUser) return;
    renderAvatar(currentUser);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') cerrarModal(); });

    if (currentUser.role === 'student') {
        await renderAlumno();
    } else {
        await renderDocente();
    }
});
</script>
