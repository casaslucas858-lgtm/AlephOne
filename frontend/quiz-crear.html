<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Quiz — AlephOne</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ── OPTION COLORS ── */
        :root {
            --opt-a: #7C3AED;
            --opt-b: #0EA5E9;
            --opt-c: #1CE6C1;
            --opt-d: #4BE61C;
        }

        /* ── LAYOUT: split 340px | flex ── */
        .quiz-shell {
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: 0;
            height: calc(100vh - var(--header-h));
            overflow: hidden;
        }

        /* ── PANEL IZQUIERDO: lista de preguntas ── */
        .panel-left {
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-left-header {
            padding: 20px 18px 14px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .quiz-meta { display: flex; flex-direction: column; gap: 10px; }

        .quiz-title-input {
            width: 100%;
            padding: 8px 0;
            background: transparent;
            border: none;
            border-bottom: 1.5px solid var(--border);
            font-family: var(--font-display);
            font-size: 1.1em;
            font-weight: 700;
            color: var(--text);
            transition: border-color var(--t);
        }
        .quiz-title-input:focus {
            outline: none;
            border-bottom-color: var(--teal);
        }
        .quiz-title-input::placeholder { color: var(--text-faint); font-weight: 600; }

        .quiz-meta-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .meta-select {
            padding: 6px 10px;
            background: var(--bg-subtle);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 0.78em;
            font-weight: 600;
            color: var(--text-muted);
            font-family: var(--font-display);
            cursor: pointer;
            transition: all var(--t);
            appearance: none;
        }
        .meta-select:focus { outline: none; border-color: var(--teal); }

        /* Lista de preguntas */
        .pregunta-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .pregunta-thumb {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: var(--bg-subtle);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            transition: all var(--t);
            position: relative;
        }

        .pregunta-thumb:hover { background: var(--bg-hover); border-color: var(--teal); }

        .pregunta-thumb.active {
            background: rgba(38,212,199,0.08);
            border-color: var(--teal);
            border-left: 3px solid var(--teal);
        }

        .pregunta-num {
            font-family: var(--font-display);
            font-size: 0.72em;
            font-weight: 800;
            color: var(--text-faint);
            width: 20px;
            flex-shrink: 0;
            text-align: center;
        }
        .pregunta-thumb.active .pregunta-num { color: var(--teal); }

        .pregunta-thumb-info { flex: 1; min-width: 0; }
        .pregunta-thumb-text {
            font-size: 0.82em;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .pregunta-thumb-tipo {
            font-size: 0.7em;
            color: var(--text-faint);
            margin-top: 1px;
            font-family: var(--font-display);
        }

        .pregunta-del {
            background: transparent;
            border: none;
            color: var(--text-faint);
            font-size: 0.85em;
            padding: 2px 4px;
            border-radius: 4px;
            cursor: pointer;
            opacity: 0;
            transition: all var(--t);
            flex-shrink: 0;
        }
        .pregunta-thumb:hover .pregunta-del { opacity: 1; }
        .pregunta-del:hover { background: rgba(220,53,69,0.1); color: #dc3545; }

        /* Footer del panel izquierdo */
        .panel-left-footer {
            padding: 12px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        /* ── PANEL DERECHO: editor ── */
        .panel-right {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg);
        }

        .editor-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .editor-header-left { display: flex; align-items: center; gap: 12px; }

        .tipo-selector {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .tipo-chip {
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 0.74em;
            font-weight: 700;
            border: 1px solid var(--border);
            background: var(--bg-subtle);
            color: var(--text-muted);
            cursor: pointer;
            transition: all var(--t);
            font-family: var(--font-display);
        }
        .tipo-chip:hover { border-color: var(--teal); color: var(--text); }
        .tipo-chip.active {
            background: var(--teal);
            border-color: var(--teal);
            color: #0a0a0a;
        }

        .editor-settings {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .setting-item {
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--bg-subtle);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 5px 10px;
            font-size: 0.78em;
            color: var(--text-muted);
        }

        .setting-item label { font-family: var(--font-display); font-weight: 600; }

        .setting-item input[type="number"] {
            width: 48px;
            background: transparent;
            border: none;
            font-size: 0.9em;
            font-weight: 700;
            color: var(--text);
            font-family: var(--font-display);
            text-align: center;
        }
        .setting-item input[type="number"]:focus { outline: none; }

        /* Editor body */
        .editor-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Empty state del editor */
        .editor-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-faint);
            text-align: center;
            gap: 12px;
            padding: 48px;
        }
        .editor-empty .empty-icon { font-size: 3em; opacity: 0.3; }
        .editor-empty p { font-size: 0.875em; }

        /* Enunciado */
        .enunciado-area {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-card);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-lg);
            font-size: 1em;
            font-family: var(--font-body);
            color: var(--text);
            resize: none;
            min-height: 80px;
            line-height: 1.6;
            transition: all var(--t);
        }
        .enunciado-area:focus {
            outline: none;
            border-color: var(--teal);
            box-shadow: 0 0 0 3px rgba(38,212,199,0.08);
        }
        .enunciado-area::placeholder { color: var(--text-faint); }

        /* Sección de opciones */
        .opciones-section { display: flex; flex-direction: column; gap: 8px; }

        .opcion-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: var(--radius);
            border: 1.5px solid var(--border);
            background: var(--bg-card);
            transition: all var(--t);
            cursor: pointer;
        }

        .opcion-item:hover { border-color: rgba(255,255,255,0.2); }

        .opcion-item.correcta { border-color: currentColor; }

        .opcion-item[data-opt="A"] { --opt-color: var(--opt-a); }
        .opcion-item[data-opt="B"] { --opt-color: var(--opt-b); }
        .opcion-item[data-opt="C"] { --opt-color: var(--opt-c); }
        .opcion-item[data-opt="D"] { --opt-color: var(--opt-d); }

        .opcion-item.correcta {
            background: color-mix(in srgb, var(--opt-color) 10%, transparent);
            border-color: var(--opt-color);
        }

        .opcion-letra {
            width: 28px; height: 28px;
            border-radius: var(--radius);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-display);
            font-size: 0.8em;
            font-weight: 800;
            color: white;
            flex-shrink: 0;
        }

        .opcion-item[data-opt="A"] .opcion-letra { background: var(--opt-a); }
        .opcion-item[data-opt="B"] .opcion-letra { background: var(--opt-b); }
        .opcion-item[data-opt="C"] .opcion-letra { background: var(--opt-c); color: #0a0a0a; }
        .opcion-item[data-opt="D"] .opcion-letra { background: var(--opt-d); color: #0a0a0a; }

        .opcion-input {
            flex: 1;
            background: transparent;
            border: none;
            font-size: 0.9em;
            color: var(--text);
            font-family: var(--font-body);
        }
        .opcion-input:focus { outline: none; }
        .opcion-input::placeholder { color: var(--text-faint); }

        .opcion-check {
            width: 18px; height: 18px;
            border: 1.5px solid var(--border);
            border-radius: 50%;
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            transition: all var(--t);
            font-size: 0.7em;
        }

        .opcion-item.correcta .opcion-check {
            background: var(--opt-color);
            border-color: var(--opt-color);
            color: white;
        }
        .opcion-item[data-opt="C"].correcta .opcion-check,
        .opcion-item[data-opt="D"].correcta .opcion-check {
            color: #0a0a0a;
        }

        /* Respuesta corta / numérica */
        .respuesta-directa {
            padding: 12px 16px;
            background: var(--bg-card);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            font-size: 0.9em;
            color: var(--text);
            font-family: var(--font-body);
            transition: all var(--t);
            width: 100%;
        }
        .respuesta-directa:focus {
            outline: none;
            border-color: var(--teal);
            box-shadow: 0 0 0 3px rgba(38,212,199,0.08);
        }

        /* VF */
        .vf-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .vf-btn {
            padding: 14px;
            border-radius: var(--radius);
            border: 1.5px solid var(--border);
            background: var(--bg-card);
            font-family: var(--font-display);
            font-size: 0.9em;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            transition: all var(--t);
            text-align: center;
        }

        .vf-btn:hover { border-color: var(--teal); color: var(--text); }

        .vf-btn.selected-v {
            background: rgba(75,230,28,0.1);
            border-color: var(--opt-d);
            color: var(--opt-d);
        }
        .vf-btn.selected-f {
            background: rgba(220,53,69,0.08);
            border-color: #dc3545;
            color: #dc3545;
        }

        /* Sección label */
        .section-label {
            font-size: 0.72em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-faint);
            font-family: var(--font-display);
            margin-bottom: 4px;
        }

        /* Footer del editor */
        .editor-footer {
            padding: 14px 24px;
            border-top: 1px solid var(--border);
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .pregunta-counter {
            font-family: var(--font-display);
            font-size: 0.78em;
            font-weight: 700;
            color: var(--text-faint);
        }

        /* Mobile */
        .mobile-nav-btn {
            display: none;
            background: var(--bg-subtle);
            border: 1px solid var(--border);
            color: var(--text);
            width: 34px; height: 34px;
            border-radius: var(--radius);
            font-size: 1em;
            align-items: center; justify-content: center;
            cursor: pointer;
        }

        @media (max-width: 900px) {
            .mobile-nav-btn { display: flex; }
            .quiz-shell { grid-template-columns: 1fr; }
            .panel-left { display: none; height: 280px; }
            .panel-left.open { display: flex; }
        }
    </style>
</head>
<body>
<div class="app-shell">

    <!-- TOPBAR -->
    <header class="topbar">
        <div style="display:flex;align-items:center;gap:10px;">
            <button class="mobile-nav-btn" onclick="toggleMobileNav()">☰</button>
            <span class="topbar-logo">ℵ AlephOne</span>
        </div>
        <div class="topbar-right">
            <button class="dark-mode-toggle" id="darkModeBtn">🌙</button>
            <div class="user-pill">
                <div class="user-avatar" id="userAvatar">?</div>
                <span id="username">—</span>
                <span class="role-badge" id="userRole">—</span>
            </div>
            <button class="btn btn-ghost btn-sm" onclick="logout()">Salir</button>
        </div>
    </header>

    <!-- SIDEBAR -->
    <nav class="sidebar" id="sidebar">
        <span class="nav-section-label">Principal</span>
        <a href="dashboard.html" class="nav-link"><span class="nav-icon">🏠</span> Dashboard</a>
        <a href="comunicacion.html" class="nav-link"><span class="nav-icon">📢</span> Comunicación</a>
        <a href="tareas.html" class="nav-link"><span class="nav-icon">📋</span> Tareas</a>
        <span class="nav-section-label">Académico</span>
        <a href="horario.html" class="nav-link"><span class="nav-icon">🗓️</span> Horario</a>
        <a href="promedios.html" class="nav-link"><span class="nav-icon">📊</span> Promedios</a>
        <span class="nav-section-label">Herramientas</span>
        <a href="quizzit.html" class="nav-link active"><span class="nav-icon">🧪</span> Quizzit</a>
        <a href="ai-chat.html" class="nav-link"><span class="nav-icon">🤖</span> Fractal AI</a>
        <div class="sidebar-footer">
            <button class="btn btn-ghost btn-sm" onclick="logout()" style="width:100%;">← Cerrar sesión</button>
        </div>
    </nav>

    <!-- MAIN -->
    <main class="main-content" style="padding:0;overflow:hidden;">
        <div class="quiz-shell">

            <!-- PANEL IZQUIERDO -->
            <div class="panel-left" id="panelLeft">

                <div class="panel-left-header">
                    <div class="quiz-meta">
                        <input type="text" class="quiz-title-input" id="quizTitulo"
                               placeholder="Título del quiz" maxlength="80">
                        <div class="quiz-meta-row">
                            <select class="meta-select" id="quizCurso">
                                <option value="3A">Curso: 3A</option>
                                <option value="3B">Curso: 3B</option>
                                <option value="4A">Curso: 4A</option>
                                <option value="todos">Todos</option>
                            </select>
                            <select class="meta-select" id="quizModo">
                                <option value="clasico">Modo: Clásico</option>
                                <option value="per_cent">Modo: Per Cent</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="pregunta-list" id="preguntaList">
                    <!-- preguntas renderizadas acá -->
                </div>

                <div class="panel-left-footer">
                    <button class="btn btn-primary" style="width:100%;justify-content:center;"
                            onclick="agregarPregunta()">
                        + Agregar pregunta
                    </button>
                </div>
            </div>

            <!-- PANEL DERECHO: editor -->
            <div class="panel-right" id="panelRight">

                <!-- Editor header — se muestra cuando hay pregunta activa -->
                <div class="editor-header" id="editorHeader" style="display:none;">
                    <div class="editor-header-left">
                        <span class="pregunta-counter" id="preguntaCounter">P1</span>
                        <div class="tipo-selector" id="tipoSelector">
                            <button class="tipo-chip active" data-tipo="multiple_choice"
                                    onclick="cambiarTipo('multiple_choice',this)">Multiple</button>
                            <button class="tipo-chip" data-tipo="verdadero_falso"
                                    onclick="cambiarTipo('verdadero_falso',this)">V/F</button>
                            <button class="tipo-chip" data-tipo="numerica"
                                    onclick="cambiarTipo('numerica',this)">Numérica</button>
                            <button class="tipo-chip" data-tipo="respuesta_corta"
                                    onclick="cambiarTipo('respuesta_corta',this)">Corta</button>
                        </div>
                    </div>
                    <div class="editor-settings">
                        <div class="setting-item">
                            <label>⏱</label>
                            <input type="number" id="settingTiempo" value="30" min="5" max="120" step="5">
                            <span>s</span>
                        </div>
                        <div class="setting-item">
                            <label>★</label>
                            <input type="number" id="settingPuntos" value="100" min="10" max="1000" step="10">
                            <span>pts</span>
                        </div>
                    </div>
                </div>

                <!-- Editor body -->
                <div class="editor-body" id="editorBody">
                    <div class="editor-empty" id="editorEmpty">
                        <div class="empty-icon">🧪</div>
                        <p>Agregá una pregunta para empezar</p>
                    </div>
                </div>

                <!-- Editor footer -->
                <div class="editor-footer" id="editorFooter" style="display:none;">
                    <div style="display:flex;gap:8px;">
                        <button class="btn btn-secondary btn-sm" onclick="preguntaAnterior()">← Anterior</button>
                        <button class="btn btn-secondary btn-sm" onclick="preguntaSiguiente()">Siguiente →</button>
                    </div>
                    <div style="display:flex;gap:8px;">
                        <button class="btn btn-secondary" onclick="guardarBorrador()">Guardar borrador</button>
                        <button class="btn btn-primary" onclick="publicarQuiz()">Publicar quiz →</button>
                    </div>
                </div>

            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
// ── Estado local ──────────────────────────────────────────
let preguntas = [];
let activaIdx  = -1;
let currentUser = null;

const TIPO_LABELS = {
    multiple_choice: 'Múltiple',
    verdadero_falso: 'V/F',
    numerica: 'Numérica',
    respuesta_corta: 'Corta'
};

function _defaultPregunta(orden) {
    return {
        _id: Date.now() + Math.random(), // id local temporal
        orden,
        tipo: 'multiple_choice',
        enunciado: '',
        opciones: ['', '', '', ''],
        respuesta_correcta: null,
        tiempo_segundos: 30,
        puntos: 100
    };
}

// ── Render lista izquierda ────────────────────────────────
function renderLista() {
    const list = document.getElementById('preguntaList');
    if (preguntas.length === 0) {
        list.innerHTML = `<div style="text-align:center;padding:32px 16px;color:var(--text-faint);font-size:0.82em;">
            Sin preguntas todavía
        </div>`;
        return;
    }
    list.innerHTML = preguntas.map((p, i) => `
        <div class="pregunta-thumb ${i === activaIdx ? 'active' : ''}"
             onclick="seleccionarPregunta(${i})">
            <span class="pregunta-num">${i + 1}</span>
            <div class="pregunta-thumb-info">
                <div class="pregunta-thumb-text">${sanitize(p.enunciado || 'Sin enunciado')}</div>
                <div class="pregunta-thumb-tipo">${TIPO_LABELS[p.tipo] || p.tipo} · ${p.tiempo_segundos}s · ${p.puntos}pts</div>
            </div>
            <button class="pregunta-del" onclick="eliminarPregunta(event,${i})">✕</button>
        </div>
    `).join('');
}

// ── Render editor derecho ─────────────────────────────────
function renderEditor() {
    const header  = document.getElementById('editorHeader');
    const body    = document.getElementById('editorBody');
    const footer  = document.getElementById('editorFooter');
    const empty   = document.getElementById('editorEmpty');

    if (activaIdx === -1 || !preguntas[activaIdx]) {
        header.style.display  = 'none';
        footer.style.display  = 'none';
        body.innerHTML = `<div class="editor-empty"><div class="empty-icon">🧪</div><p>Agregá una pregunta para empezar</p></div>`;
        return;
    }

    const p = preguntas[activaIdx];
    header.style.display = 'flex';
    footer.style.display = 'flex';

    // Counter
    document.getElementById('preguntaCounter').textContent = `P${activaIdx + 1}`;

    // Tipo chips
    document.querySelectorAll('.tipo-chip').forEach(c => {
        c.classList.toggle('active', c.dataset.tipo === p.tipo);
    });

    // Settings
    document.getElementById('settingTiempo').value = p.tiempo_segundos;
    document.getElementById('settingPuntos').value  = p.puntos;

    // Body
    body.innerHTML = `
        <div>
            <div class="section-label">Enunciado</div>
            <textarea class="enunciado-area" id="enunciadoArea"
                      placeholder="Escribí la pregunta acá..."
                      oninput="syncEnunciado(this.value)">${sanitize(p.enunciado)}</textarea>
        </div>
        <div id="opcionesContainer">
            ${renderOpciones(p)}
        </div>`;
}

function renderOpciones(p) {
    const letras = ['A','B','C','D'];

    if (p.tipo === 'multiple_choice') {
        return `
            <div class="section-label">Opciones — clic para marcar correcta</div>
            <div class="opciones-section">
                ${(p.opciones || ['','','','']).map((op, i) => `
                    <div class="opcion-item ${p.respuesta_correcta === letras[i] ? 'correcta' : ''}"
                         data-opt="${letras[i]}"
                         onclick="marcarCorrecta('${letras[i]}')">
                        <div class="opcion-letra">${letras[i]}</div>
                        <input class="opcion-input"
                               type="text"
                               placeholder="Opción ${letras[i]}"
                               value="${sanitize(op)}"
                               oninput="syncOpcion(${i}, this.value)"
                               onclick="event.stopPropagation()">
                        <div class="opcion-check">${p.respuesta_correcta === letras[i] ? '✓' : ''}</div>
                    </div>`).join('')}
            </div>`;
    }

    if (p.tipo === 'verdadero_falso') {
        return `
            <div class="section-label">Respuesta correcta</div>
            <div class="vf-row">
                <button class="vf-btn ${p.respuesta_correcta === 'Verdadero' ? 'selected-v' : ''}"
                        onclick="setVF('Verdadero')">✓ Verdadero</button>
                <button class="vf-btn ${p.respuesta_correcta === 'Falso' ? 'selected-f' : ''}"
                        onclick="setVF('Falso')">✗ Falso</button>
            </div>`;
    }

    if (p.tipo === 'numerica') {
        return `
            <div class="section-label">Respuesta numérica correcta</div>
            <input type="number" class="respuesta-directa"
                   placeholder="Ej: 42"
                   value="${p.respuesta_correcta !== null ? p.respuesta_correcta : ''}"
                   oninput="syncRespuestaDirecta(this.value)">`;
    }

    if (p.tipo === 'respuesta_corta') {
        return `
            <div class="section-label">Respuesta corta correcta</div>
            <input type="text" class="respuesta-directa"
                   placeholder="Ej: fotosíntesis"
                   value="${sanitize(p.respuesta_correcta || '')}"
                   oninput="syncRespuestaDirecta(this.value)">
            <p style="font-size:0.76em;color:var(--text-faint);margin-top:4px;">
                Se comparará ignorando mayúsculas y espacios extra.
            </p>`;
    }

    return '';
}

// ── Sync handlers ─────────────────────────────────────────
function syncEnunciado(val) {
    if (activaIdx < 0) return;
    preguntas[activaIdx].enunciado = val;
    renderLista();
}

function syncOpcion(i, val) {
    if (activaIdx < 0) return;
    preguntas[activaIdx].opciones[i] = val;
}

function syncRespuestaDirecta(val) {
    if (activaIdx < 0) return;
    preguntas[activaIdx].respuesta_correcta = val;
}

function marcarCorrecta(letra) {
    if (activaIdx < 0) return;
    preguntas[activaIdx].respuesta_correcta = letra;
    document.getElementById('opcionesContainer').innerHTML =
        renderOpciones(preguntas[activaIdx]);
}

function setVF(valor) {
    if (activaIdx < 0) return;
    preguntas[activaIdx].respuesta_correcta = valor;
    document.getElementById('opcionesContainer').innerHTML =
        renderOpciones(preguntas[activaIdx]);
}

function cambiarTipo(tipo, el) {
    if (activaIdx < 0) return;
    preguntas[activaIdx].tipo = tipo;
    preguntas[activaIdx].respuesta_correcta = null;
    if (tipo === 'multiple_choice')
        preguntas[activaIdx].opciones = preguntas[activaIdx].opciones || ['','','',''];
    renderEditor();
    renderLista();
}

// Settings sync
document.addEventListener('input', e => {
    if (activaIdx < 0) return;
    if (e.target.id === 'settingTiempo')
        preguntas[activaIdx].tiempo_segundos = parseInt(e.target.value) || 30;
    if (e.target.id === 'settingPuntos')
        preguntas[activaIdx].puntos = parseInt(e.target.value) || 100;
    renderLista();
});

// ── Navegación ────────────────────────────────────────────
function agregarPregunta() {
    const nueva = _defaultPregunta(preguntas.length);
    preguntas.push(nueva);
    activaIdx = preguntas.length - 1;
    renderLista();
    renderEditor();
}

function seleccionarPregunta(i) {
    activaIdx = i;
    renderLista();
    renderEditor();
}

function eliminarPregunta(e, i) {
    e.stopPropagation();
    if (!confirm('¿Eliminar esta pregunta?')) return;
    preguntas.splice(i, 1);
    if (activaIdx >= preguntas.length) activaIdx = preguntas.length - 1;
    renderLista();
    renderEditor();
}

function preguntaAnterior() {
    if (activaIdx > 0) { activaIdx--; renderLista(); renderEditor(); }
}

function preguntaSiguiente() {
    if (activaIdx < preguntas.length - 1) { activaIdx++; renderLista(); renderEditor(); }
}

// ── Guardar / Publicar ───────────────────────────────────
async function guardarBorrador() {
    await _guardar(false);
}

async function publicarQuiz() {
    await _guardar(true);
}

async function _guardar(redirigir) {
    const titulo = document.getElementById('quizTitulo').value.trim();
    if (!titulo) { showToast('Poné un título al quiz', 'warning'); return; }
    if (preguntas.length === 0) { showToast('Agregá al menos una pregunta', 'warning'); return; }

    const curso = document.getElementById('quizCurso').value;
    const modo  = document.getElementById('quizModo').value;

    const resQuiz = await AlephAPI.Quiz.crear({ titulo, descripcion: '', curso });
    if (!resQuiz.ok) { showToast('Error guardando quiz: ' + resQuiz.error, 'error'); return; }

    const quizId = resQuiz.quiz.id;

    for (let i = 0; i < preguntas.length; i++) {
        const p = preguntas[i];
        await AlephAPI.Preguntas.crear({
            quizId,
            orden: i,
            tipo: p.tipo,
            enunciado: p.enunciado,
            opciones: p.tipo === 'multiple_choice' ? p.opciones : null,
            respuestaCorrecta: p.respuesta_correcta,
            tiempoSegundos: p.tiempo_segundos,
            puntos: p.puntos
        });
    }

    showToast('Quiz guardado ✓', 'success');
    if (redirigir) setTimeout(() => window.location.href = 'quizzit.html', 1000);
}

// ── Mobile nav ────────────────────────────────────────────
function toggleMobileNav() {
    document.getElementById('sidebar').classList.toggle('open');
}

function renderAvatar(user) {
    const el = document.getElementById('userAvatar');
    if (el) el.textContent = user.username.charAt(0).toUpperCase();
    const roleEl = document.getElementById('userRole');
    if (roleEl) {
        const roles = { student: 'Estudiante', teacher: 'Docente', director: 'Director' };
        roleEl.textContent = roles[user.role] || user.role;
        roleEl.className = `role-badge ${user.role}`;
    }
}

// ── Init ─────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
    await AlephAPI.Auth.init();
    currentUser = requireAuth();
    if (!currentUser) return;
    if (currentUser.role === 'student') {
        showToast('Solo los docentes pueden crear quizzes', 'error');
        setTimeout(() => window.location.href = 'dashboard.html', 1500);
        return;
    }
    renderAvatar(currentUser);
    renderLista();
});
</script>
